        // async funciton logApiResults() {}
        // whenever we use 'await', must flag function as 'async'
        const logApiResults = async () => {
            // await = js doesn't move past a line until the line resolves
            const response = await fetch('https://rickandmortyapi.com/api/character/1')
            
            const result = await response.json() //another way to convert JSON to JS

            console.log(result.name)
            return result
        }

        // add callback function
        logApiResults().then((data) => {
            //now our returned result came in as data because we used .then() to add a callback function
            // why? so we can chain events without await or async
            // use template literals to insert vars within string
            const message = `${data.name} is a ${data.species} from ${data.origin.name} and they are ${data.status}`
            console.log(message)
        }).catch((error) => {
            console.error(error)
        })
