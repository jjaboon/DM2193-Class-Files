<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bootstrap demo</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <div class="container mt-5">
      <h1>Hello, <span id="user">world!</span></h1>
      <form id="userInfo" class="shadow-sm p-3 m-5 bg-body-tertiary">
        <div class="form-floating mb-3">
          <input
            type="text"
            class="form-control"
            id="firstName"
            
            placeholder="name@example.com"
          />
          <label for="firstName">First Name:</label>
        </div>
        <button type="button" class="btn btn-lg btn-outline-info" id="nameBtn">
          Submit
        </button>
      </form>
      <button type="button" class="btn btn-lg btn-outline-danger" id="clearBtn">
        Clear Current User Data
      </button>
    </div>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        document.getElementById("nameBtn").addEventListener('click', () => {
          saveUser()
        })
        document.getElementById("clearBtn").addEventListener('click', () => {
          clearLocalStorage()
        })

        if (localStorage.firstName) {
          document.getElementById('user').innerHTML = localStorage.firstName
        }
      })

      const saveUser = () => {
        const name = document.getElementById('firstName').value
        localStorage.firstName = name
      }
      const clearLocalStorage = () => {
        localStorage.clear()
        location.reload()
      }
    </script>
  </body>
</html>
