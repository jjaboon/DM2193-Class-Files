<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Responsive 101</title>
    <link rel="stylesheet" type="text/css" href="./css/styles.css" />
    <script type="text/javascript">

      document.addEventListener('DOMContentLoaded', function() {
        // this is where we do things like get elements and store them as js variables
        // This is also where we add event listeners to elements on the page.
        document.getElementById("mobile-menu").addEventListener("click", toggleShow);
      });

      /*
      function toggleShow() {
        // get the ul from our main nav and store the element itself at a js variable
        var menu = document.getElementById("menu");

        // long way
        // if menu's class list property contains show, remove it.
        // if it does not contain show, add it
        if (menu.classList.contains("show")) {
          menu.classList.remove("show");
        } else {
          menu.classList.add("show");
        }
      }
        */
      function toggleShow() {
        document.getElementById("menu").classList.toggle("show");
      }
    </script>
  </head>
