<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Location Map</title>

    <!-- Leaflet CSS — styles the map -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />

    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 20px;
        text-align: center;
        color: #1a1a1a;
      }

      h1 {
        margin-bottom: 4px;
      }

      .subtitle {
        color: #6b7280;
        margin-bottom: 20px;
      }

      #status {
        margin: 16px 0;
        font-size: 18px;
        color: #374151;
        padding: 12px;
        background-color: #f3f4f6;
        border-radius: 8px;
        max-width: 800px;
        margin-left: auto;
        margin-right: auto;
      }

      #map {
        height: 450px;
        width: 100%;
        max-width: 800px;
        margin: 0 auto;
        border-radius: 8px;
        border: 2px solid #d1d5db;
      }
    </style>
  </head>
  <body>
    <h1>My Location on a Map</h1>
    <p class="subtitle">Geolocation API + Leaflet</p>
    <div id="status">Finding your location...</div>
    <div id="map"></div>

    <!-- Leaflet JavaScript -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script></script>
  </body>
</html>
